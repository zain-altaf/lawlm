chunking:
  chunk_size_chars: 1536
  overlap_chars: 300
  min_chunk_size_chars: 400
  quality_threshold: 0.3
  separators:
    - "\n\n"
    - ". "
    - "? "
    - "! "
    - "\n"
    - " "
    - ""

vectorization:
  embedding_model: "BAAI/bge-small-en-v1.5"
  batch_size: 50
  memory_cleanup_frequency: 100
  device: "cpu"
  vector_size: 384

qdrant:
  collection_name: "caselaw-chunks"
  url: "http://qdrant:6333"

api:
  request_delay: 0.5
  max_retries: 3
  retry_delay: 2
