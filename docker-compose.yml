services:
  base-image:
    build:
      context: .
      dockerfile: Dockerfile.base
    image: lawlm-base:latest

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test:
        ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  data-ingestion:
    build:
      context: .
      dockerfile: ./data-ingestion/Dockerfile
    image: data-ingestion:latest
    ports:
      - "5001:5001"
    env_file:
      - .env
    volumes:
      - ./config.yml:/app/config.yml
    restart: "no"
    container_name: data-ingestion
    depends_on:
      qdrant:
        condition: service_healthy
        restart: true

  chatbot:
    build:
      context: .
      dockerfile: ./chatbot/Dockerfile
    image: chatbot:latest
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./config.yml:/app/config.yml
    restart: unless-stopped
    container_name: chatbot
    depends_on:
      qdrant:
        condition: service_healthy
        restart: true
